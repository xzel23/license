[versions]
projectVersion = "0.7.0-SNAPSHOT"
cabe-plugin = "4.4.0"
jdkprovider-plugin = "0.8.0"
jreleaser-plugin = "1.23.0"
sonar-plugin = "7.3.1.8318"
spotbugs-plugin = "6.5.6"
test-logger-plugin = "4.0.0"
versions-plugin = "0.54.0"

dua3-utility = "23.0.0-beta4-SNAPSHOT"

jspecify = "1.0.0"
junit-bom = "6.1.0"
log4j-bom = "2.26.0"
bouncycastle = "1.84"
jackson = "3.2.0"
slb4j = "0.12.1"

[libraries]
jspecify = { group = "org.jspecify", name = "jspecify", version.ref = "jspecify" }
dua3-utility-bom = { group = "com.dua3.utility", name = "utility-bom", version.ref = "dua3-utility" }
dua3-utility = { group = "com.dua3.utility", name = "utility" }
log4j-bom = { group = "org.apache.logging.log4j", name = "log4j-bom", version.ref = "log4j-bom" }
log4j-api = { group = "org.apache.logging.log4j", name = "log4j-api" }
slb4j = { group = "org.slb4j", name = "slb4j", version.ref = "slb4j" }
bouncycastle-provider = { group = "org.bouncycastle", name = "bcprov-jdk18on", version.ref = "bouncycastle" }
bouncycastle-pkix = { group = "org.bouncycastle", name = "bcpkix-jdk18on", version.ref = "bouncycastle" }
jackson-bom = { group = "tools.jackson", name = "jackson-bom", version.ref = "jackson" }
jackson-core = { group = "tools.jackson.core", name = "jackson-core" }
jackson-databind = { group = "tools.jackson.core", name = "jackson-databind" }
jackson-annotations = { group = "com.fasterxml.jackson.core", name = "jackson-annotations" }
junit-bom = { group = "org.junit", name = "junit-bom", version.ref = "junit-bom" }
junit-jupiter-api = { group = "org.junit.jupiter", name = "junit-jupiter-api" }
junit-jupiter-engine = { group = "org.junit.jupiter", name = "junit-jupiter-engine" }
junit-platform-launcher = { group = "org.junit.platform", name = "junit-platform-launcher" }

[plugins]
jdk = { id = "com.dua3.gradle.jdkprovider", version.ref = "jdkprovider-plugin" }
cabe = { id = "com.dua3.cabe", version.ref = "cabe-plugin" }
jreleaser = { id = "org.jreleaser", version.ref = "jreleaser-plugin" }
sonar = { id = "org.sonarqube", version.ref = "sonar-plugin" }
spotbugs = { id = "com.github.spotbugs", version.ref = "spotbugs-plugin" }
test-logger = { id = "com.adarshr.test-logger", version.ref = "test-logger-plugin" }
versions = { id = "com.github.ben-manes.versions", version.ref = "versions-plugin" }
